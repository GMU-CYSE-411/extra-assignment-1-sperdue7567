name: Extra OWASP Dependency Check (Manual)

on:
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Run OWASP Dependancy Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: extra-assignment-1-sperdue7567
          path: ./GMU-CYSE411/extra-assignment-1-sperdue7567
          format: HTML
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: reports
  
